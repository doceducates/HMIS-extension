name: Release Extension

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.3.1, v2.0.0, etc.

permissions:
  contents: write # Required to create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Extension
        run: npm run build

      - name: Package ZIP
        run: zip -r "HMIS-Autopilot-${{ github.ref_name }}.zip" dist/

      - name: Package CRX
        run: |
          # Create temporary pem file from secret
          echo "${{ secrets.EXTENSION_KEY }}" > hmis.pem
          # Use npx crx to pack the extension
          npx crx pack dist -p hmis.pem -o "HMIS-Autopilot-${{ github.ref_name }}.crx"
          # Clean up pem
          rm hmis.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HMIS-Autopilot-${{ github.ref_name }}.zip
            HMIS-Autopilot-${{ github.ref_name }}.crx
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
